name: Keep Site Warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm init -y
      - run: npm i playwright
      - run: npx playwright install chromium --with-deps

      - name: Keep site open repeatedly
        run: |
          node - <<'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const url = 'https://girisimci.nl';

            const browser = await chromium.launch({ headless: true });

            for (let i = 1; i <= 3; i++) {
              const page = await browser.newPage();

              console.log(`Visit ${i}: opening ${url}`);

              await page.goto(url, {
                waitUntil: 'networkidle',
                timeout: 60000
              });

              console.log(`Visit ${i}: waiting 90 seconds`);
              await page.waitForTimeout(90000);

              await page.close();
              console.log(`Visit ${i}: closed`);
            }

            await browser.close();
            console.log('All visits completed.');
          })();
          EOF
